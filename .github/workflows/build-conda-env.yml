name: Build Conda-Pack Environment

on:
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: 'Optional tag suffix (e.g. "rc1"). Leave blank to use timestamp.'
        required: false
        default: ''

jobs:
  build-conda-pack:
    name: Build Conda-Pack Environment - ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            os: macos-latest
            artifact_name: conda-env-macos-arm64
            asset_name: dipper_pytorch_env-macos-arm64.tar.gz
          - platform: windows-x64
            os: windows-latest
            artifact_name: conda-env-windows-x64
            asset_name: dipper_pytorch_env-windows-x64.tar.gz
          - platform: linux-x64
            os: ubuntu-latest
            artifact_name: conda-env-linux-x64
            asset_name: dipper_pytorch_env-linux-x64.tar.gz

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.11'
          miniforge-version: latest

      - name: Build conda-pack environment
        shell: bash -el {0}
        run: |
          cd backend
          python build_conda_pack.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Verify conda-pack archive
        shell: bash
        run: |
          if [ -f "environments/dipper_pytorch_env.tar.gz" ]; then
            echo "[SUCCESS] Conda-pack environment built successfully"
            ls -lh environments/dipper_pytorch_env.tar.gz
          else
            echo "[ERROR] Conda-pack environment not found"
            exit 1
          fi

      - name: Rename archive with platform suffix
        shell: bash
        run: |
          mv environments/dipper_pytorch_env.tar.gz environments/${{ matrix.asset_name }}
          ls -lh environments/${{ matrix.asset_name }}

      - name: Upload conda-pack artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: environments/${{ matrix.asset_name }}
          retention-days: 90

  create-release:
    name: Create Conda Environment Release
    needs: build-conda-pack
    runs-on: ubuntu-latest
    # Only run if at least one build succeeded
    if: always() && contains(needs.build-conda-pack.result, 'success')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Display artifact structure
        run: |
          echo "Downloaded artifacts:"
          find artifacts/ -type f

      - name: Create release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag_suffix }}" ]; then
            TAG="conda-env-$(date +'%Y%m%d')-${{ github.event.inputs.tag_suffix }}"
          else
            TAG="conda-env-$(date +'%Y%m%d-%H%M%S')"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Release tag: ${TAG}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "ML Environment - ${{ steps.tag.outputs.tag }}"
          files: artifacts/**/*.tar.gz
          draft: false
          prerelease: false
          make_latest: false
          body: |
            ## Dipper ML Environment (conda-pack)

            Pre-built conda-pack environments for running ML tasks in Dipper.
            The app downloads the appropriate file automatically on first use.

            ### Asset naming
            | File | Platform |
            |------|----------|
            | `dipper_pytorch_env-macos-arm64.tar.gz` | macOS Apple Silicon |
            | `dipper_pytorch_env-windows-x64.tar.gz` | Windows x64 |
            | `dipper_pytorch_env-linux-x64.tar.gz` | Linux x64 |

            ### Manual installation
            Download the archive for your platform and place it at:
            - **macOS/Linux:** `~/Library/Caches/Dipper/archives/dipper_pytorch_env.tar.gz`
            - **Windows:** `%LOCALAPPDATA%\BioacousticsApp\Dipper\Cache\archives\dipper_pytorch_env.tar.gz`

            Then launch Dipper and run any ML task — it will extract automatically.

            ### Contents
            - Python 3.11, PyTorch, OpenSoundscape, Bioacoustics Model Zoo
            - All training and inference dependencies

            Built: ${{ steps.tag.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
