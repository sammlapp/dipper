name: dipper_pytorch_env
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.12
  - pip

  - pip:
    # General app and IO framework
    - pyyaml>=6.0
    - h5py>=3.0.0
    - psutil>=5.8.0
    # v82 removed pkg_resources required by tf
    # see https://github.com/pypa/setuptools/issues/5174
    - setuptools<82.0.0 

    # HTTP and networking
    - aiohttp>=3.8.0
    - aiohttp-cors>=0.7.0

    # Bioacoustics libraries (with development code)
    - git+https://github.com/kitzeslab/opensoundscape.git@dev.20251120
    - bioacoustics-model-zoo==0.12.3
    
    # optional BMZ dependencies for extended model support
    - timm>=1.0.0 # for HawkEars
    - torchaudio # for HawkEarsc
    - ai-edge-litert # for BirdNET (.tflite)
    - transformers # for BirdSET
    - tensorflow>=2.20.0 # for Perch and Perch v2
    - tensorflow-hub # for Perch and Perch v2
